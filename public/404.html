<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>TITAN Surf Club — Gestion</title>
    <!-- Ce fichier permet à GitHub Pages de gérer les routes React (ex: /adherents) au rechargement. -->
    <script type="text/javascript">
      var segmentCount = 0 // à ajuster si le site n'est pas à la racine du domaine (rare)
      var l = window.location
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      )
    </script>
  </head>
  <body></body>
</html>
